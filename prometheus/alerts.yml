# CollectIQ — example Prometheus alert rules (v1).
# Load with: prometheus --config.file=prometheus.yml where rule_files includes this path.
# Tune thresholds for your environment and traffic.

groups:
  - name: collectiq
    interval: 30s
    rules:
      - alert: CollectiqHighExecutionFailureRate
        expr: |
          (
            sum(rate(collectiq_executions_failed_total[5m]))
            /
            clamp_min(sum(rate(collectiq_executions_started_total[5m])), 0.001)
          ) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High SMEK execution failure rate
          description: |
            More than 20% of started SMEK executions are failing (compliance or exception)
            over the last 5 minutes. Inspect logs and GET /observability/trace/:correlationId.

      - alert: CollectiqPaymentFailuresSpike
        expr: sum(rate(collectiq_payment_failures_total[5m])) > 0.5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Payment failures spike
          description: |
            Sustained rate of payment_failures_total exceeds 0.5/s. Check Stripe/Twilio,
            idempotency rows, and PaymentService structured logs.

      - alert: CollectiqCircuitBreakerOpen
        expr: |
          sum(rate(collectiq_circuit_breaker_open_total{event="trip"}[5m])) > 0
            or
          sum(rate(collectiq_circuit_breaker_open_total{event="reject"}[1m])) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Circuit breaker tripped or rejecting traffic
          description: |
            Resilience circuits are opening or rejecting calls. Check adapter health,
            RESILIENCE_FAILURE_THRESHOLD / RESILIENCE_COOLDOWN_MS, and provider status.

      - alert: CollectiqApiLatencyP95Breached
        expr: histogram_quantile(0.95, sum by (le) (rate(collectiq_api_latency_ms_bucket[5m]))) > 1000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: API p95 latency SLO breached
          description: API p95 latency is above 1000ms over a 5 minute window.

      - alert: CollectiqApiErrorRateBreached
        expr: |
          (
            sum(rate(collectiq_api_errors_total[5m]))
            /
            clamp_min(sum(rate(collectiq_api_requests_total[5m])), 0.001)
          ) > 0.02
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: API error-rate SLO breached
          description: API error ratio is above 2% over a 5 minute window.

      - alert: CollectiqWorkerLatencyP95Breached
        expr: histogram_quantile(0.95, sum by (le) (rate(collectiq_worker_latency_ms_bucket[10m]))) > 5000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Worker p95 latency SLO breached
          description: Worker p95 latency is above 5000ms over a 10 minute window.

      - alert: CollectiqWorkerBacklogDepthHigh
        expr: max(collectiq_worker_backlog_depth) > 500
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Worker backlog depth SLO breached
          description: Worker backlog depth is above 500.

      - alert: CollectiqSseListenerRejectionsDetected
        expr: increase(collectiq_sse_listener_rejected_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: SSE listener rejection SLO breached
          description: SSE listener rejections detected in the last 5 minutes.

      - alert: CollectiqProjectionIntegrityFailuresDetected
        expr: increase(collectiq_projection_integrity_errors_total[15m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Projection integrity failure detected
          description: Projection integrity errors observed in the last 15 minutes.
